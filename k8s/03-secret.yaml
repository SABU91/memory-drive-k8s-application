# SECRET TEMPLATE — do NOT commit real secrets.
#
# Memory Drive has no mandatory secret values, but this template shows the
# shape you would use for API keys, DB credentials, etc. Values under
# stringData are written verbatim (Kubernetes base64-encodes them for you).
#
# Create/replace it out-of-band, e.g.:
#   kubectl -n memory-drive create secret generic memory-drive-secret \
#     --from-literal=APP_SECRET=replace-me --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: memory-drive-secret
  namespace: memory-drive
  labels:
    app.kubernetes.io/name: memory-drive
type: Opaque
stringData:
  # Example placeholder — replace before using in anything real.
  APP_SECRET: "change-me"
