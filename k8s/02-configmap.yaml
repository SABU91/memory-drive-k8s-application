apiVersion: v1
kind: ConfigMap
metadata:
  name: memory-drive-config
  namespace: memory-drive
  labels:
    app.kubernetes.io/name: memory-drive
data:
  # --- Server ---
  PORT: "8080"
  GIN_MODE: "release"

  # --- Persistence (paths live on the mounted PersistentVolume) ---
  DB_PATH: "/data/memorydrive.db"
  UPLOAD_DIR: "/data/uploads"
  MAX_UPLOAD_MB: "10"

  # --- Workload generation (safe defaults sized for t2.micro nodes) ---
  # Turn these up to deliberately raise memory/CPU usage and observe it in
  # Grafana. Keep CACHE_SIZE_MB + BASELINE_MEMORY_MB well under the pod's
  # memory limit so the container is never OOM-killed.
  ENABLE_MEMORY_CACHE: "true"
  CACHE_SIZE_MB: "64"
  BASELINE_MEMORY_MB: "16"

  ENABLE_BACKGROUND_WORKERS: "true"
  WORKER_COUNT: "2"
  WORKER_INTERVAL_SECONDS: "10"
