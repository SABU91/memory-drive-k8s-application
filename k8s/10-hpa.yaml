apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memory-drive-backend
  namespace: memory-drive
  labels:
    app.kubernetes.io/name: memory-drive
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: memory-drive-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
# NOTE: the backend mounts a ReadWriteOnce volume, so scaled replicas are
# scheduled onto the single node holding that volume and share the SQLite file
# via WAL locking. Use `POST /simulate/load` to drive CPU up and watch the HPA
# react. Requires metrics-server to be installed in the cluster.
