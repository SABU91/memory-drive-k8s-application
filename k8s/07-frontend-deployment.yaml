apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-drive-frontend
  namespace: memory-drive
  labels:
    app.kubernetes.io/name: memory-drive
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: memory-drive
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: memory-drive
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: memory-drive
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx user in the unprivileged image
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: 077582400920.dkr.ecr.eu-north-1.amazonaws.com/learning/memory-drive-frontend:2610cb3b09bed1c2fce177ce62f5aeaf47214a7d # replace with your registry/tag
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
