# Nginx config for serving the Memory Drive SPA.
# It serves the static build and falls back to index.html for client-side
# routing. API paths are routed to the backend by the Kubernetes Ingress, so
# no reverse-proxy config is needed here.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache the hashed assets produced by Vite.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health endpoint for Kubernetes probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
